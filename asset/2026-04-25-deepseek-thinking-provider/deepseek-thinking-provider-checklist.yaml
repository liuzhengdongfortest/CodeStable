feature: 2026-04-25-deepseek-thinking-provider
created: 2026-04-25

steps:
  - action: "数据结构铺底：为 RequestMessage、WireResponse、ProviderResponse、WireStreamDelta、ProviderProgressEvent 增加 reasoning 字段/变体"
    exit_signal: "cargo check -p march-core 至少推进到所有新增字段编译错误清完，非 DeepSeek provider 构造函数默认 None"
    status: done
  - action: "OpenAI message serialization / parsing：实现 assistant reasoning_content 序列化、stream parse、non-stream parse，并删除正文 fallback"
    exit_signal: "新增单元测试证明 reasoning_content 不会出现在 content，但会出现在 response reasoning 字段"
    status: done
  - action: "DeepSeek request policy 与 preset 更新：更新 DeepSeek base URL / suggested models / model capabilities / 前端 URL 默认值，插入 thinking request 字段并跳过采样参数"
    exit_signal: "单元测试构造 DeepSeek V4 request body，断言含 thinking.enabled、reasoning_effort=high，且不含 temperature / top_p / penalties"
    status: done
  - action: "Provider delivery reasoning collector：stream collector 分别累积 reasoning 和正文，并向上发 ProviderProgressEvent::ReasoningDelta"
    exit_signal: "stream parse + delivery 层测试证明 reasoning delta 被累计到 ProviderResponse.reasoning_content，content 仍独立"
    status: done
  - action: "Agent/UI 事件链路：新增 AssistantReasoningPreview，打通 messaging 层和 persisted timeline"
    exit_signal: "后端事件单测或 reducer 测试证明 reasoning delta 写入 PersistedAssistantMessage.reasoning，UI event field 为 reasoning"
    status: done
  - action: "Tool-call 轮内回传：agent runner 在追加 assistant tool-call transient message 时带 response.reasoning_content"
    exit_signal: "构造一轮 provider response { reasoning_content, tool_calls } 后，下一次 serialized messages 中的 assistant tool-call message 包含相同 reasoning"
    status: done
  - action: "文档和回归验证：更新架构文档并跑测试"
    exit_signal: "cargo test -p march-core 或定向测试通过；design 中列出的官方约束在 reasoning.md / provider.md 中有对应长期说明"
    status: done

checks:
  - item: "不接 DeepSeek Anthropic API 格式；本 feature 只覆盖 OpenAI-compatible Chat Completions"
    source: 范围守护
    status: done
  - item: "不新增 Protocol::DeepSeek 或独立 DeepSeekWire；DeepSeek 继续走 Protocol::OpenAi"
    source: 范围守护
    status: done
  - item: "不做全局 reasoning 设置 UI 重做；只接入最小必要的 DeepSeek request 参数和后端/UI 事件链路"
    source: 范围守护
    status: done
  - item: "不把 reasoning_content 写入 recent_chat、Notes、Memory 或最终 assistant text"
    source: 范围守护
    status: done
  - item: "不支持 <think>...</think> fallback 的新解析器；本 feature 针对 DeepSeek 官方 reasoning_content 字段"
    source: 范围守护
    status: done
  - item: "DeepSeek Thinking Mode 下不发送 temperature、top_p、presence_penalty、frequency_penalty"
    source: 范围守护
    status: done
  - item: "挂载点可反向移除：settings/vendor_preset.rs、src/lib/providerBaseUrl.ts、model_capabilities.json、provider.rs、provider/messages.rs、provider/wire.rs、provider/wire/shared.rs、provider/delivery.rs、agent/runner.rs、agent/prompting.rs、ui/backend/messaging.rs、architecture/DESIGN.md、architecture/provider.md、architecture/reasoning.md"
    source: 挂载点
    status: done
  - item: "RequestMessage 支持 assistant reasoning_content；OpenAI ChatCompletions 序列化时 assistant tool-call message 可同时包含 content、reasoning_content、tool_calls"
    source: 接口契约
    status: done
  - item: "来自 recent_chat 的 assistant final text 不带 reasoning_content"
    source: 接口契约
    status: done
  - item: "DeepSeek V4 thinking 请求包含 thinking.enabled 和 reasoning_effort=high，并保留 max_tokens"
    source: 接口契约
    status: done
  - item: "DeepSeek stream chunk 的 delta.reasoning_content 映射为 WireStreamDelta::ReasoningDelta 和 UI field=reasoning"
    source: 接口契约
    status: done
  - item: "DeepSeek stream chunk 的 delta.content 继续映射为 WireStreamDelta::ContentDelta 和 UI field=content"
    source: 接口契约
    status: done
  - item: "非流式 message.reasoning_content 进入 WireResponse/ProviderResponse 的 reasoning 字段，message.content 仍单独作为正文"
    source: 接口契约
    status: done
  - item: "content 为空且 reasoning_content 非空且无 tool calls 时，agent 不把 reasoning 当 final text"
    source: 接口契约
    status: done
  - item: "AgentProgressEvent::AssistantReasoningPreview 更新 persisted message.reasoning，并发送 UiAssistantStreamField::Reasoning"
    source: 接口契约
    status: done
  - item: "DeepSeek preset 默认 URL 为 https://api.deepseek.com，probe model 为 deepseek-v4-flash，suggested models 含 deepseek-v4-flash / deepseek-v4-pro"
