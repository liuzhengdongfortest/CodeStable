    status: done
  - item: "OpenAI stream reasoning parse 单元测试覆盖 reasoning_content、content、同 chunk 两者同时存在三种情况"
    source: 测试约束
    status: done
  - item: "Non-stream reasoning parse 单元测试覆盖 reasoning_content + content + tool_calls 三类字段保留"
    source: 测试约束
    status: done
  - item: "Tool-call 回传测试覆盖第一轮 response 带 reasoning_content + tool_calls，第二轮 request assistant message 原样带回 reasoning_content"
    source: 测试约束
    status: done
  - item: "非 DeepSeek OpenAI-compatible request 不插入 thinking 字段，采样参数行为保持原样"
    source: 测试约束
    status: done
  - item: "架构文档更新 DeepSeek Thinking Mode、reasoning_content、tool-call 轮内回传和不进入 recent_chat 的长期约束"
    source: 测试约束
    status: done
