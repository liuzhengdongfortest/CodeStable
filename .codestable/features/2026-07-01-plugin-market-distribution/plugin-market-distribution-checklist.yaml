feature: 2026-07-01-plugin-market-distribution
created: 2026-07-01

steps:
  - action: "目录迁移：用 git mv 把根 cs / cs-* skill 目录移动到 plugins/codestable/skills/"
    exit_signal: "根目录无 cs* skill 目录，plugins/codestable/skills/cs/SKILL.md 存在"
    status: done
  - action: "版本与 manifest 骨架：新增 VERSION / CHANGELOG.md、Codex / Claude manifest 和 marketplace catalog"
    exit_signal: "三条 manifest version 路径、Codex catalog source、Claude source、Codex skills=./skills/ 校验通过"
    status: done
  - action: "gitignore 与资产路径护栏：确保可安装资产能进入 git"
    exit_signal: ".gitignore 仅将 .claude 锚定为 /.claude/ 且新增 /dist/，保留 __pycache__、*.pyc、.DS_Store、.codestable/；git check-ignore 不忽略 .agents/plugins/marketplace.json、.claude-plugin/marketplace.json、plugins/codestable/skills/cs/SKILL.md"
    status: done
  - action: "校验器与失败规则：新增 check-plugin-package 覆盖 schema、semver、changelog、根目录残留、非 cs skill、缓存和临时产物"
    exit_signal: "pytest 覆盖正常结构、缺 VERSION、缺 changelog 版本段、manifest 不合法、根目录残留 cs skill、非 cs skill 和缓存排除"
    status: done
  - action: "活跃引用接入：更新 README / README.en.md、CLAUDE.md、活跃结构说明、tests 和工具脚本中的路径型引用"
    exit_signal: "README 中能找到当前 repo marketplace 安装、npx skills@latest 真实安装命令和本地隔离验证命令；测试引用 plugins/codestable/skills/cs-onboard/... 而不是根 cs-onboard/；python3 -m pytest tests/ 通过；历史 .codestable/features 归档不被批量改写"
    status: done

checks:
  - item: "plugins/codestable/skills/ 是唯一 canonical skill 目录，根目录不保留 cs* skill 副本"
    source: 名词契约
    status: passed
  - item: "根目录不保留 cs* symlink、stub SKILL.md 或 redirect 兼容层；路径变化只通过 README / CHANGELOG 说明"
    source: 兼容边界
    status: passed
  - item: "不兼容只扫描仓库根目录的旧同步器；README / CHANGELOG 说明应升级为 marketplace 或指定 plugins/codestable/skills/ 路径"
    source: 兼容边界
    status: passed
  - item: "manifest version 精确校验 plugins/codestable/.codex-plugin/plugin.json:version、plugins/codestable/.claude-plugin/plugin.json:version、.claude-plugin/marketplace.json:plugins[0].version"
    source: 名词契约
    status: passed
  - item: "Codex manifest skills 字段精确等于 ./skills/"
    source: 名词契约
    status: passed
  - item: "Claude marketplace plugins[0].source 精确等于 ./plugins/codestable"
    source: 挂载点
    status: passed
  - item: "Claude marketplace 顶层 name / owner / description 和插件 author 通过 claude plugin validate --strict"
    source: 挂载点
    status: passed
  - item: "Codex catalog source 对象为 {source: local, path: ./plugins/codestable}"
    source: 挂载点
    status: passed
  - item: "Codex marketplace catalog 顶层 name 为 codestable，供 codex plugin add codestable@codestable 定位 marketplace"
    source: 挂载点
    status: passed
  - item: "Codex catalog 条目使用 policy.installation=AVAILABLE、policy.authentication=ON_INSTALL、category 和 interface.displayName"
    source: 挂载点
    status: passed
  - item: "skills CLI 能通过根 .claude-plugin/marketplace.json 发现 plugins/codestable/skills/cs/SKILL.md；不要求 --list 只包含 cs*"
    source: skills-cli-compat
    status: passed
  - item: "skills CLI 验证在临时副本执行，运行后原工作树 git status --short 与运行前一致"
    source: skills-cli-compat
    status: passed
  - item: "可安装资产进入 git，不放在被忽略的 dist 下，也不被 .claude ignore 规则吞掉"
    source: 安装可达性
    status: passed
  - item: ".gitignore 使用 /.claude/ 和 /dist/，保留既有 __pycache__、*.pyc、.DS_Store、.codestable/ 忽略项，不依赖父目录已被忽略后的单条负向 re-include"
    source: 安装可达性
    status: passed
  - item: "设计阶段 YAML 校验使用 .codestable/tools/validate-yaml.py 或迁移后的源路径，不继续引用已迁走的根 cs-onboard/tools/validate-yaml.py"
    source: 验证命令
    status: passed
  - item: "非 cs skill、缓存文件和临时 dist 产物不进入 plugins/codestable/ 插件实体"
    source: 范围守护
    status: passed
  - item: "README / README.en.md 用一句边界说明澄清仓库根其他 skill（如 browser-bridge）不属于 CodeStable 插件资产"
    source: 范围守护
    status: passed
  - item: "缺 VERSION、缺当前 CHANGELOG 版本段、manifest 不合法、资产路径被 ignore 或根目录残留 cs* skill / symlink / stub / redirect 时校验失败"
    source: 验收场景
    status: passed
  - item: "不迁移仓库到 codestable/codestable，也不直接发布公开 marketplace"
    source: 范围守护
    status: passed
  - item: "旧根目录路径清理要求 README、当前 feature、活跃结构说明、tests 和工具脚本更新；历史 feature / acceptance / evidence 可保留旧路径"
    source: 文档边界
    status: passed
  - item: "旧根目录路径清理显式覆盖 CLAUDE.md；只改文件系统路径引用，不改流程节点名或 skill 名称引用"
    source: 文档边界
    status: passed
  - item: "既有测试套件迁移后全量通过，覆盖 cs-onboard tools/reference/hooks 的路径更新"
    source: 迁移无损
    status: passed

dod:
  commands:
    - id: CMD-001
      command: "python3 tools/check-plugin-package.py"
      core: true
      failure_handling: fix-or-block
    - id: CMD-002
      command: "python3 -m pytest tests/test_plugin_package.py"
      core: true
      failure_handling: fix-or-block
    - id: CMD-003
      command: "python3 -m pytest tests/"
      core: true
      failure_handling: fix-or-block
    - id: CMD-004
      command: "tmp=$(mktemp -d) && mkdir -p \"$tmp/repo\" && rsync -a --exclude '.git/' ./ \"$tmp/repo/\" && before=$(git status --short) && (cd \"$tmp/repo\" && npx skills@latest add . --list) && after=$(git status --short) && test \"$before\" = \"$after\""
      core: true
      failure_handling: fix-or-block
    - id: CMD-005
      command: "python3 .codestable/tools/validate-yaml.py --file .codestable/features/2026-07-01-plugin-market-distribution/plugin-market-distribution-checklist.yaml --yaml-only"
      core: true
      failure_handling: fix-or-block
    - id: CMD-006
      command: "git diff --check"
      core: true
      failure_handling: fix-or-block
  evidence_required:
    - command_output
    - diff_summary
  cleanliness:
    debug_output: forbidden
    temporary_todo: forbidden
    generated_dist: forbidden
    duplicate_skill_copy: forbidden
